services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: qsearch_qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"   # REST/HTTP
      - "6334:6334"                   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    # No container healthcheck: the Qdrant image ships without a guaranteed
    # shell/curl. Reachability is checked from the host against the REST port.

  postgres:
    image: postgres:17
    container_name: qsearch_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-qsearch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qsearch}
      POSTGRES_DB: ${POSTGRES_DB:-qsearch}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qsearch} -d ${POSTGRES_DB:-qsearch}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8.14
    container_name: qsearch_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      # Skip the login screen's master-password prompt for a local PoC.
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      # Pre-register the Postgres connection (reachable as host "postgres"
      # on the internal network, port 5432).
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  qdrant_data:
  postgres_data:
  pgadmin_data:
